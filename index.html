<!doctype html>
<html lang="en">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kiran Gade</title>

<style>
  :root{color-scheme:light dark; --bg:#0b1220; --fg:#e8eefc; --card:rgba(255,255,255,.06); --bd:rgba(255,255,255,.14)}
  [data-theme="light"]{--bg:#f6f7fb; --fg:#0b1220; --card:#fff; --bd:rgba(0,0,0,.12)}
  body{margin:0; min-height:100vh; display:grid; place-items:center; background:var(--bg); color:var(--fg);
       font:16px/1.4 system-ui,Segoe UI,Roboto,Arial}
  .c{width:min(760px,92vw); padding:26px 22px; border-radius:16px; border:1px solid var(--bd); background:var(--card)}
  h1{margin:0 0 10px; font-size:34px}
  .row{display:flex; gap:12px; flex-wrap:wrap; align-items:center; justify-content:space-between}
  .pill{padding:10px 12px; border:1px solid var(--bd); border-radius:999px; background:rgba(255,255,255,.04)}
  .age{margin-top:14px; font:600 18px/1.7 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; white-space:pre-wrap}
  button{cursor:pointer; border:1px solid var(--bd); background:transparent; color:var(--fg);
         padding:8px 10px; border-radius:10px}
  button:active{transform:scale(.98)}
</style>

<body>
  <main class="c">
    <div class="row">
      <div>
        <h1>Kiran Gade</h1>
        <div class="pill">DOB: 01 Jan 1991</div>
      </div>
      <button id="toggle" aria-label="Toggle theme">🌙/☀️</button>
    </div>

    <div id="age" class="age">Loading…</div>
  </main>

<script>
  // DOB (local time): 01-01-1991 00:00:00.000
  const dob = new Date(1991, 0, 1, 0, 0, 0, 0);

  // Theme toggle (persist)
  const saved = localStorage.getItem("theme");
  if (saved) document.documentElement.dataset.theme = saved;

  document.getElementById("toggle").onclick = () => {
    const cur = document.documentElement.dataset.theme;
    const next = cur === "light" ? "" : "light"; // "" => dark/default
    document.documentElement.dataset.theme = next;
    localStorage.setItem("theme", next);
  };

  // Smooth animated counter: update internal "target" each frame, ease displayed value
  let shownMs = 0;

  function tick(){
    const now = Date.now();
    const targetMs = now - dob.getTime();

    // Ease: move ~20% toward target each frame for smooth animation
    shownMs += (targetMs - shownMs) * 0.20;

    const ms = Math.max(0, shownMs);

    const totalSeconds = ms / 1000;
    const totalMinutes = totalSeconds / 60;
    const totalHours   = totalMinutes / 60;
    const totalDays    = totalHours / 24;
    const totalYears   = totalDays / 365.2425; // avg year (leap years included)

    const years = Math.floor(totalYears);
    const days  = Math.floor(totalDays % 365.2425);
    const hrs   = Math.floor(totalHours % 24);
    const mins  = Math.floor(totalMinutes % 60);
    const secs  = Math.floor(totalSeconds % 60);
    const msec  = Math.floor(ms % 1000);

    document.getElementById("age").textContent =
`Age (live)
${years} years
${days} days
${hrs} hours
${mins} minutes
${secs} seconds
${msec} milliseconds`;

    requestAnimationFrame(tick);
  }

  requestAnimationFrame(tick);
</script>
</body>
</html>
